<title>DYNASTIA · Coach de bateo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1318;
  --bg2:#141a22;
  --surface:#1a212b;
  --surface2:#212b37;
  --line:#2b3744;
  --text:#eef2f6;
  --muted:#8a98a8;
  --accent:#ff5436;
  --accent2:#ff7a4d;
  --green:#2fbf71;
  --blue:#3a8dde;
  --amber:#f2a93b;
  --purple:#9b6cff;
  --radius:16px;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Manrope',sans-serif;
  background:
     radial-gradient(1200px 600px at 50% -10%, #1c2531 0%, transparent 60%),
     var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
.bebas{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.app{max-width:520px;margin:0 auto;padding:0 16px}

/* Header */
.topbar{
  position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg, rgba(15,19,24,.96), rgba(15,19,24,.82));
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 14px) 0 14px;
}
.topbar-inner{max-width:520px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.logo{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;box-shadow:0 6px 16px rgba(255,84,54,.35);
}
.logo svg{width:22px;height:22px;stroke:#fff}
.brand .name{font-size:30px;line-height:.9}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}

/* Views */
.view{padding-top:18px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.view-title{font-size:34px;line-height:1;margin-bottom:2px}
.view-sub{color:var(--muted);font-size:13px;margin-bottom:18px}

/* Cards */
.card{
  background:linear-gradient(180deg,var(--surface),var(--bg2));
  border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;
}
.card.pad0{padding:0;overflow:hidden}
.row{display:flex;align-items:center;gap:12px}
.between{justify-content:space-between}
.muted{color:var(--muted)}
.tiny{font-size:12px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.03em;text-transform:uppercase}
.pill.green{background:rgba(47,191,113,.16);color:#5fe39a}
.pill.amber{background:rgba(242,169,59,.16);color:#ffce7a}
.pill.accent{background:rgba(255,84,54,.16);color:var(--accent2)}
.pill.blue{background:rgba(58,141,222,.16);color:#7db9f0}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--surface2);border:1px solid var(--line);
  color:var(--text);font-weight:700;font-size:15px;
  padding:13px 16px;border-radius:13px;min-height:50px;width:100%;
  transition:transform .08s, background .15s;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;box-shadow:0 8px 20px rgba(255,84,54,.3)}
.btn.ghost{background:transparent}
.btn.sm{min-height:42px;padding:9px 13px;font-size:14px;width:auto}
.btn.danger{color:#ff8a7a;border-color:rgba(255,84,54,.3)}
.btn-row{display:flex;gap:10px}
.icon-btn{width:42px;height:42px;min-height:42px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;background:var(--surface2);border:1px solid var(--line)}
.icon-btn svg{width:19px;height:19px;stroke:var(--text)}

/* Forms */
label.field{display:block;margin-bottom:12px}
label.field .lab{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.input,select.input,textarea.input{
  width:100%;background:var(--bg);border:1px solid var(--line);
  color:var(--text);padding:13px 14px;border-radius:12px;outline:none;
}
.input:focus{border-color:var(--accent)}
textarea.input{resize:vertical;min-height:74px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* List items */
.li{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.avatar{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-family:'Bebas Neue';font-size:22px;color:#fff;background:linear-gradient(135deg,#2b3744,#1a212b);border:1px solid var(--line);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block}
.mini-cal{gap:4px}
.cal-cell.paid{border-color:var(--green);background:rgba(47,191,113,.12)}
.li .meta{flex:1;min-width:0}
.li .meta .nm{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li .meta .dt{font-size:12px;color:var(--muted)}
.chev{stroke:var(--muted);width:18px;height:18px;flex:0 0 auto}

/* Progress bar */
.prog{height:9px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.prog > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s}

/* Stat tiles */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:14px}
.stat .v{font-family:'Bebas Neue';font-size:38px;line-height:.9}
.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.stat.accent .v{color:var(--accent2)}
.stat.green .v{color:var(--green)}

.empty{text-align:center;padding:38px 16px;color:var(--muted)}
.empty svg{width:46px;height:46px;stroke:var(--line);margin-bottom:10px}
.section-h{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin:22px 4px 10px}

/* Bottom nav */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:linear-gradient(0deg, rgba(15,19,24,.99), rgba(15,19,24,.9));
  backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
}
.nav-inner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted)}
.nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2}
.nav button span{font-size:10px;font-weight:700;letter-spacing:.02em}
.nav button.active{color:var(--accent2)}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex;animation:fade .2s}
.modal{background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:8px 18px calc(24px + env(safe-area-inset-bottom));animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.grab{width:42px;height:5px;border-radius:999px;background:var(--line);margin:10px auto 14px}
.modal h2{font-size:22px;margin-bottom:16px}

/* Timer fullscreen */
.timer-screen{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;color:#fff;transition:background .4s;overflow-y:auto}
.timer-screen.show{display:flex}
.phase-prep{background:linear-gradient(160deg,#1f4e7a,#0f2740)}
.phase-work{background:linear-gradient(160deg,#1f8a4d,#0c3d22)}
.phase-rest{background:linear-gradient(160deg,#b5791b,#5c3d0c)}
.phase-restSeries{background:linear-gradient(160deg,#7d4bc4,#341b56)}
.phase-reps{background:linear-gradient(160deg,#c2541f,#5c220c)}
.phase-done{background:linear-gradient(160deg,#c23a26,#5c170f)}
.ts-top{padding:calc(env(safe-area-inset-top) + 18px) 22px 0;display:flex;justify-content:space-between;align-items:center}
.ts-x{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);display:grid;place-items:center}
.ts-x svg{width:22px;height:22px;stroke:#fff}
.ts-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 22px}
.ts-label{font-family:'Bebas Neue';font-size:46px;letter-spacing:.04em;text-transform:uppercase;opacity:.95}
.ts-block{font-size:15px;font-weight:700;opacity:.8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
.ts-num{font-family:'Bebas Neue';font-size:min(46vw,230px);line-height:.85;font-variant-numeric:tabular-nums}
.ts-meta{font-size:16px;font-weight:700;opacity:.85;margin-top:8px;letter-spacing:.05em}
.ts-next{font-size:13px;opacity:.6;margin-top:14px}
.ts-bottom{padding:0 22px calc(env(safe-area-inset-bottom) + 26px);display:flex;gap:12px}
.ts-btn{flex:1;min-height:62px;border-radius:16px;background:rgba(255,255,255,.16);color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;gap:8px;backdrop-filter:blur(4px)}
.ts-btn.main{background:#fff;color:#111}
.ts-btn svg{width:22px;height:22px}
.ts-prog{height:6px;background:rgba(255,255,255,.18);margin:0 22px 16px;border-radius:999px;overflow:hidden}
.ts-prog > i{display:block;height:100%;background:#fff;border-radius:999px;transition:width .3s}

.fab{position:fixed;right:max(16px,calc(50% - 244px));bottom:calc(86px + env(safe-area-inset-bottom));z-index:35;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 10px 24px rgba(255,84,54,.4);display:grid;place-items:center}
.fab svg{width:26px;height:26px;stroke:#fff;stroke-width:2.5}
.hide{display:none!important}
.toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#fff;color:#111;font-weight:700;padding:12px 18px;border-radius:12px;z-index:90;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:opacity .25s, transform .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.block-card{border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px;background:var(--bg)}
.mini{width:34px;height:34px;border-radius:9px;background:var(--surface2);border:1px solid var(--line);color:var(--text);font-size:14px;font-weight:700;display:grid;place-items:center;flex:0 0 auto}
.mini:disabled{opacity:.3}
.drag-handle{cursor:grab;touch-action:none;font-size:16px;color:var(--muted)}
.dragrow{transition:border-color .15s, box-shadow .15s}
.dragrow.dragging{opacity:.75;border-color:var(--accent);box-shadow:0 10px 26px rgba(0,0,0,.55)}
.seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted)}
.seg button.on{background:var(--surface2);color:var(--text)}
.note-line{padding:11px 0;border-bottom:1px solid var(--line)}
.note-line:last-child{border:none}
.warn{background:rgba(242,169,59,.1);border:1px solid rgba(242,169,59,.3);color:#ffce7a;border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:12px}
.video-bg{position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px}
.video-bg.show{display:flex;animation:fade .2s}
.video-box{width:100%;max-width:680px;position:relative}
.video-x{position:absolute;top:-46px;right:0;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center}
.video-frame{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden}
.ts-video-row{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.ts-video{background:rgba(255,255,255,.16);color:#fff;font-weight:800;font-size:13px;padding:10px 15px;border-radius:12px;display:inline-flex;align-items:center;gap:7px;backdrop-filter:blur(4px)}
.ts-video svg{width:15px;height:15px;fill:#fff}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:24px}
.cal-nav{width:42px;height:42px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);color:var(--text);font-size:24px;font-weight:700;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{margin-bottom:6px}
.cal-dow-c{text-align:center;font-size:11px;color:var(--muted);font-weight:800}
.cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text);font-weight:700;padding:0}
.cal-cell.empty{border:none;background:transparent}
.cal-cell.active{background:var(--surface)}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.cal-cell span{font-size:14px}
.cal-ic{font-size:9px;line-height:1;height:10px}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:11px;color:var(--muted)}
</style>
</head>

<script>
/* ---------------- Storage (con respaldo en memoria para la vista previa) ---------------- */
const Store = {
  mem:{},
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return this.mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ this.mem[k]=v; } }
};
const KEY='dugout_db_v1';
function loadDB(){
  try{ const r=Store.get(KEY); if(r) return JSON.parse(r); }catch(e){}
  return { students:[], programs:[], attendance:[], payments:[],
    settings:{ pkgPrice:300, pkgSize:6, particularPrice:150 } };
}
let db = loadDB();
function save(){ Store.set(KEY, JSON.stringify(db)); }
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ---- Catálogo base de ejercicios (versionado: futuras actualizaciones agregan más sin borrar lo tuyo) ---- */
const BASE_CATS=['Activación','Fuerza de Swing','Correctivos','Drills en Tee','Drills en Máquina','Infielders','Estiramientos'];
const BASE_EXERCISES=[
 {key:'b01',name:'Hip 90/90 Rotations',category:'Activación',type:'reps',series:2,reps:8,restSeries:15,note:'Para qué: Movilidad bilateral de cadera, base de la carga del swing. Ver: https://www.youtube.com/watch?v=f_7qIPxw6nE. Vol: 2x8/lado'},
 {key:'b02',name:'Thoracic Spine Rotations',category:'Activación',type:'reps',series:2,reps:10,restSeries:15,note:'Para qué: Rotación de columna torácica, clave para separación de hombros en el swing. Ver: https://www.youtube.com/watch?v=JGxTjeDOf3M. Vol: 2x10/lado'},
 {key:'b03',name:'Band Pull-Aparts',category:'Activación',type:'reps',series:2,reps:15,restSeries:15,note:'Para qué: Activa manguito rotador posterior, previene lesiones de hombro. Ver: https://www.youtube.com/watch?v=pMpxOYsHplk. Vol: 2x15'},
 {key:'b04',name:'Med Ball Hip Toss',category:'Activación',type:'reps',series:2,reps:8,restSeries:20,note:'Para qué: Activa cadena cinética rotacional completa a baja intensidad. Ver: https://www.youtube.com/shorts/ZczrUD4yJ6I. Vol: 2x8/lado'},
 {key:'b05',name:'Glute Bridge con pausa',category:'Activación',type:'reps',series:2,reps:12,restSeries:15,note:'Para qué: Activa glúteos para ground force del swing. Pausa 2 seg arriba. Ver: https://www.youtube.com/watch?v=pmp1PHaumq4. Vol: 2x12'},
 {key:'b06',name:'Inchworm con Rotación',category:'Activación',type:'reps',series:2,reps:6,restSeries:15,note:'Para qué: Movilidad de isquios + activación de core + rotación torácica. Ver: https://www.youtube.com/watch?v=XmodvmHVjAM. Vol: 2x6'},
 {key:'b07',name:'Lateral Band Walks',category:'Activación',type:'reps',series:2,reps:12,restSeries:15,note:'Para qué: Activa glúteo medio y abductores, estabilizadores del stance. Ver: https://www.youtube.com/watch?v=sWVAy6_Gafo. Vol: 2x12/lado'},
 {key:'b08',name:'Arm Circles + Band Pull-Aparts',category:'Activación',type:'reps',series:1,reps:15,restSeries:0,note:'Para qué: Calentamiento articular de hombro antes de movimiento explosivo. Ver: https://www.youtube.com/watch?v=LoBBo1dtY6I. Vol: 10 círculos + 15 pull-aparts'},
 {key:'b09',name:'Med Ball Rotational Throw',category:'Fuerza de Swing',type:'reps',series:3,reps:8,restSeries:60,note:'Para qué: El ejercicio más transferible al swing, potencia rotacional explosiva. Ver: https://www.youtube.com/watch?v=SgcyVVYytwY. Vol: 3x8/lado'},
 {key:'b10',name:'Landmine Rotational Press',category:'Fuerza de Swing',type:'reps',series:3,reps:8,restSeries:60,note:'Para qué: Fuerza rotacional unilateral combinando empuje y core. Ver: https://www.youtube.com/watch?v=MswsBPLGhE8. Vol: 3x8/lado'},
 {key:'b11',name:'Cable Pallof Press (anti-rotación)',category:'Fuerza de Swing',type:'reps',series:3,reps:12,restSeries:45,note:'Para qué: Construye base estable para generar rotación poderosa. Ver: https://www.youtube.com/watch?v=dBAmQ9bx3JA. Vol: 3x12/lado'},

/* ---- Migración + catálogo base ---- */
(function migrate(){
  if(!db.attendance) db.attendance=[];
  if(!db.payments) db.payments=[];
  if(!db.plans) db.plans=[];
  if(!db.settings) db.settings={pkgPrice:300,pkgSize:6,particularPrice:150};
  if(!db.categories) db.categories=[];
  BASE_CATS.forEach(c=>{ if(!db.categories.includes(c)) db.categories.push(c); });
  if(!db.exercises) db.exercises=[];
  if(!db.seededKeys) db.seededKeys=[];
  // programas viejos (blocks) -> items
  (db.programs||[]).forEach(p=>{
    if(p.blocks && !p.items){
      p.items=p.blocks.map(b=>({id:uid(),name:b.label||'Ejercicio',category:'Activación',type:'time',
        prep:b.prep,work:b.work,rest:b.rest,rounds:b.rounds,series:b.series,restSeries:b.restSeries,reps:0,note:''}));
      delete p.blocks;
    }
    if(!p.items) p.items=[];
  });
  // sembrar catálogo base: solo las claves que aún no se han sembrado (respeta lo que crees o borres)
  const D={prep:0,work:0,rest:0,rounds:0,series:0,restSeries:0,reps:0,note:''};
  BASE_EXERCISES.forEach(b=>{
    if(!db.seededKeys.includes(b.key)){
      const {key,...rest}=b;
      db.exercises.push({id:uid(),seedKey:key,...D,...rest});
      db.seededKeys.push(key);
    }
  });
  // separar el link de la nota a su propio campo editable (una sola vez por ejercicio)
  db.exercises.forEach(e=>{
    if(e.video===undefined){
      const u=firstUrl(e.note||'');
      e.video = u || '';
      if(u){ e.note=(e.note||'').replace(/Ver:\s*https?:\/\/\S+/i,'').replace(/\s{2,}/g,' ').replace(/\.\s*\./g,'.').replace(/\s+\./g,'.').trim(); }
    }
  });
  save();
})();

/* ---------------- Helpers ---------------- */
const $=s=>document.querySelector(s);
const main=$('#main');
const peso=n=>'$'+(Math.round(n*100)/100).toLocaleString('es-MX');
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials=n=>(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
function avatarInner(st){ return (st && st.photo) ? `<img src="${st.photo}" alt="">` : initials(st&&st.name); }
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }
function todayISO(){ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function vibrate(p){ try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} }
/* ---- Video (YouTube incrustado) ---- */
function firstUrl(text){ const m=(text||'').match(/https?:\/\/[^\s)]+/); return m? m[0].replace(/[.,;]+$/,'') : null; }
function ytId(url){ if(!url) return null; const m=url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m? m[1] : null; }
function exVideoUrl(ex){ return (ex && ex.video) || firstUrl(ex && ex.note) || ''; }
function demoBtn(url){
  if(!url) return '';
  const safe=esc(url), id=ytId(url);
  if(id) return `<div class="btn-row" style="margin-top:8px">
      <button class="btn ghost sm" style="flex:1" onclick="showVideo('${id}')"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M5 4l14 8-14 8z"/></svg>Ver aqu\u00ed</button>
      <a class="btn ghost sm" style="flex:1;text-decoration:none" href="${safe}" target="_blank" rel="noopener">\u2197 Abrir en navegador</a>
    </div>`;
  return `<a class="btn ghost sm" style="width:100%;margin-top:8px;text-decoration:none" href="${safe}" target="_blank" rel="noopener">\u2197 Ver referencia</a>`;
}
function showVideo(id){
  const f=$('#videoFrame'); if(!f) return;
  f.innerHTML='<iframe width="100%" height="100%" style="border:0;border-radius:12px" src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0&playsinline=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
  $('#videoBg').classList.add('show');
}
function closeVideo(){ const f=$('#videoFrame'); if(f) f.innerHTML=''; $('#videoBg').classList.remove('show'); }
function pauseTimerForVideo(){ if(T.running){ T.running=false; T.last=Date.now(); const b=$('#playBtn'); if(b)b.textContent='Reanudar'; releaseWake(); } }
function showVideoFromTimer(){ pauseTimerForVideo(); if(T.curVid) showVideo(T.curVid); }
function openVideoExternalFromTimer(){ pauseTimerForVideo(); if(T.curUrl){ try{ window.open(T.curUrl,'_blank','noopener'); }catch(e){} } }
let toastT;
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }

let currentTab='alumnos';
function go(tab){
  currentTab=tab;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  render();
  window.scrollTo(0,0);
}
function fabAction(){
  if(currentTab==='alumnos') editStudent();
  else if(currentTab==='programas') (progSub==='exercises'? editExercise() : editProgram());
  else if(currentTab==='dinero') addPayment();
  else if(currentTab==='timer') go('timer');
  else go('alumnos');
}

/* ---------------- Modal ---------------- */
function openModal(html){ $('#modalBody').innerHTML=html; $('#modalBg').classList.add('show'); document.body.style.overflow='hidden'; }
function closeModal(){ $('#modalBg').classList.remove('show'); document.body.style.overflow=''; }

/* ---------------- Render router ---------------- */
function render(){
  $('#fab').classList.toggle('hide', currentTab==='reportes' || currentTab==='timer');
  if(currentTab==='alumnos') viewAlumnos();
  else if(currentTab==='programas') viewProgramas();
  else if(currentTab==='timer') viewTimer();
  else if(currentTab==='dinero') viewDinero();
  else if(currentTab==='reportes') viewAvances();
}

function studentAttendance(id){ return db.attendance.filter(a=>a.studentId===id).sort((a,b)=>b.date.localeCompare(a.date)); }
function viewAlumnos(){
  const s=db.students.slice().sort((a,b)=>a.name.localeCompare(b.name));
  let h=`<section class="view"><h1 class="view-title bebas">Alumnos</h1><div class="view-sub">${s.length} registrado${s.length===1?'':'s'}</div>`;
  if(!s.length){
    h+=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><div>Aún no tienes alumnos.<br>Toca el botón <b>+</b> para agregar el primero.</div></div>`;
  }else{
    h+=`<div class="card pad0">`;
    s.forEach(st=>{
      const used=st.package?.used||0, size=st.package?.size||0;
      const pct=size?Math.min(100,Math.round(used/size*100)):0;
      const tag = size? (used>=size?`<span class="pill amber">Renovar</span>`:`<span class="pill green">${used}/${size}</span>`) : `<span class="pill blue">Particular</span>`;
      h+=`<div class="li" onclick="studentDetail('${st.id}')">

let stuPayCal=null;
function stuPayNav(id,d){ let m=stuPayCal.m+d,y=stuPayCal.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} stuPayCal={sid:id,y,m}; studentDetail(id); }
function renderStudentPayCal(id){
  const y=stuPayCal.y, m=stuPayCal.m, ym=ymd(y,m,1).slice(0,7);
  const first=new Date(y,m,1), startDow=(first.getDay()+6)%7, days=new Date(y,m+1,0).getDate();
  const byDay={}; db.payments.filter(p=>p.studentId===id && p.date.slice(0,7)===ym).forEach(p=>{ const dd=+p.date.slice(8,10); byDay[dd]=(byDay[dd]||0)+p.amount; });
  let h=`<div class="cal-head" style="margin-bottom:8px">
    <button class="cal-nav" style="width:34px;height:34px;font-size:18px" onclick="stuPayNav('${id}',-1)">‹</button>
    <div class="bebas" style="font-size:18px">${MONTHS[m]} ${y}</div>
    <button class="cal-nav" style="width:34px;height:34px;font-size:18px" onclick="stuPayNav('${id}',1)">›</button></div>`;
  h+=`<div class="cal-grid mini-cal cal-dow">`+['L','M','X','J','V','S','D'].map(d=>`<div class="cal-dow-c" style="font-size:9px">${d}</div>`).join('')+`</div>`;
  h+=`<div class="cal-grid mini-cal">`;
  for(let i=0;i<startDow;i++) h+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){ const paid=byDay[d]; h+=`<div class="cal-cell${paid?' paid':''}"><span style="font-size:11px">${d}</span><div class="cal-ic">${paid?'💲':''}</div></div>`; }

  });
  openModal(h);
}

let studentPhoto=null;
function compressImage(file, cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const sw=Math.min(img.width,img.height);
      const target=Math.min(300, sw);
      const c=document.createElement('canvas'); c.width=target; c.height=target;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,(img.width-sw)/2,(img.height-sw)/2,sw,sw,0,0,target,target);
      try{ cb(c.toDataURL('image/jpeg',0.8)); }catch(err){ toast('No se pudo procesar la foto'); }
    };
    img.onerror=()=>toast('Imagen no válida');
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function onPhotoPick(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  compressImage(f, url=>{ studentPhoto=url; const p=$('#photoPrev'); if(p)p.innerHTML='<img src="'+url+'" alt="">'; const rm=$('#photoRm'); if(rm)rm.classList.remove('hide'); });
}

let progSub='programs';
function progSwitch(s){ progSub=s; render(); }
function fmtDur(s){ s=Math.round(s); const m=Math.floor(s/60), ss=s%60; return m?`${m}m${ss?' '+ss+'s':''}`:`${ss}s`; }
function itemSummary(it){ return it.type==='reps' ? `${it.series} ser \u00d7 ${it.reps} reps` : `${it.work}s ejerc \u00b7 ${it.rounds}r \u00d7 ${it.series}s`; }
function itemTimedSeconds(it){
  if(it.type==='time'){ const rounds=Math.max(1,+it.rounds||1), series=Math.max(1,+it.series||1);
    return (+it.prep||0)+series*rounds*(+it.work||0)+series*(rounds-1)*(+it.rest||0)+(series-1)*(+it.restSeries||0); }
  const series=Math.max(1,+it.series||1); return (series-1)*(+it.restSeries||0);
}
function programTimed(p){ return (p.items||[]).reduce((a,it)=>a+itemTimedSeconds(it),0); }

function viewProgramas(){
  let h=`<section class="view"><h1 class="view-title bebas">Entrenamiento</h1>
    <div class="seg"><button class="${progSub==='programs'?'on':''}" onclick="progSwitch('programs')">Programas</button>

function exNum(k,lab,v){ return `<label class="field" style="margin:0"><span class="lab" style="font-size:10px">${lab}</span><input class="input" type="number" inputmode="numeric" min="0" value="${v}" style="padding:11px 8px;text-align:center" oninput="exEdit.${k}=parseInt(this.value)||0"></label>`; }
function saveExercise(){
  const e=exEdit; e.name=(e.name||'').trim(); if(!e.name){ toast('Ponle nombre al ejercicio'); return; }
  e.category=(e.category||'').trim()||'General';
  if(!db.categories.includes(e.category)) db.categories.push(e.category);
  if(exItemIdx>=0){ e.id=progEdit.items[exItemIdx].id||uid(); progEdit.items[exItemIdx]=e; closeModal(); renderProgramBuilder(); toast('Ejercicio ajustado'); return; }

/* ---- Arrastrar para reordenar (táctil + mouse) ---- */
let dragRow=null;
function dragStart(ev){
  ev.preventDefault();
  const row=ev.currentTarget.closest('.dragrow'); if(!row)return;
  dragRow=row; row.classList.add('dragging');
  try{ ev.currentTarget.setPointerCapture(ev.pointerId); }catch(e){}
  document.addEventListener('pointermove', dragMove);
  document.addEventListener('pointerup', dragEnd, {once:true});
  document.addEventListener('pointercancel', dragEnd, {once:true});
}
function dragMove(ev){
  if(!dragRow)return;
  const cont=$('#prog_items'); if(!cont)return;
  const y=ev.clientY;
  const rows=[...cont.querySelectorAll('.dragrow')].filter(r=>r!==dragRow);
  let before=null;
  for(const r of rows){ const b=r.getBoundingClientRect(); if(y < b.top + b.height/2){ before=r; break; } }
  if(before){ cont.insertBefore(dragRow, before); } else { cont.appendChild(dragRow); }
}
function dragEnd(){
  document.removeEventListener('pointermove', dragMove);
  if(!dragRow)return;
  dragRow.classList.remove('dragging');
  const cont=$('#prog_items');
  const order=[...cont.querySelectorAll('.dragrow')].map(r=>+r.dataset.i);
  progEdit.items = order.map(idx=>progEdit.items[idx]);
  dragRow=null;
  renderProgItems();
}

/* ---- Motor de la gu\u00eda en vivo (tiempo + repeticiones) ---- */
let T = { phases:[], idx:0, remaining:0, running:false, interval:null, last:0, beep:true, wake:null, lastSec:null, program:null, exNames:[], attCtx:null, curVid:null, curUrl:null };
function buildExerciseSteps(ex){
  const st=[]; const vid=ytId(exVideoUrl(ex));
  if(ex.type==='reps'){
    const series=Math.max(1,+ex.series||1), reps=+ex.reps||0, restS=+ex.restSeries||0;
    for(let s=0;s<series;s++){
      st.push({mode:'manual',type:'reps',exName:ex.name,exCat:ex.category,label:ex.name,info:`Serie ${s+1}/${series}`+(reps?` \u00b7 ${reps} reps`:''),reps,vid});
      if(restS>0 && s<series-1) st.push({mode:'auto',type:'rest',exName:ex.name,exCat:ex.category,label:'Descanso',info:`Sigue serie ${s+2}/${series}`,sec:restS,vid});
    }
  } else {
    const prep=+ex.prep||0, work=+ex.work||0, rest=+ex.rest||0, rounds=Math.max(1,+ex.rounds||1), series=Math.max(1,+ex.series||1), restS=+ex.restSeries||0;
    if(prep>0) st.push({mode:'auto',type:'prep',exName:ex.name,exCat:ex.category,label:'Prep\u00e1rate',info:ex.name||'',sec:prep,vid});
    for(let s=0;s<series;s++){
      for(let r=0;r<rounds;r++){
        if(work>0) st.push({mode:'auto',type:'work',exName:ex.name,exCat:ex.category,label:ex.name||'\u00a1Ejercicio!',info:`Serie ${s+1}/${series} \u00b7 Ronda ${r+1}/${rounds}`,sec:work,vid});
        const lr=r===rounds-1, ls=s===series-1;
        if(lr&&ls){}
        else if(lr&&!ls){ if(restS>0) st.push({mode:'auto',type:'restSeries',exName:ex.name,exCat:ex.category,label:'Descanso de serie',info:`Sigue serie ${s+2}/${series}`,sec:restS,vid}); }
        else { if(rest>0) st.push({mode:'auto',type:'rest',exName:ex.name,exCat:ex.category,label:'Descanso',info:`Serie ${s+1}/${series} \u00b7 Ronda ${r+1}/${rounds}`,sec:rest,vid}); }
      }
    }
  }
  return st;
}
function runQuick(){ const q=db.quick; const steps=buildExerciseSteps({type:'time',name:'Tabata',category:'',prep:q.prep,work:q.work,rest:q.rest,rounds:q.rounds,series:q.series,restSeries:q.restSeries}); startSession(steps,null,[]); }
function runProgram(id){
  const p=db.programs.find(x=>x.id===id); if(!p||!p.items.length){ toast('Programa sin ejercicios'); return; }
  let steps=[]; p.items.forEach(it=> steps=steps.concat(buildExerciseSteps(it)));
  if(!steps.length){ toast('Agrega tiempos o series a los ejercicios'); return; }
  startSession(steps, p, [...new Set(p.items.map(it=>it.name))]);
}
function startSession(steps, program, exNames){
  if(!steps.length){ toast('Configura al menos un ejercicio'); return; }
  steps.push({mode:'auto',type:'done',sec:0,label:'\u00a1Terminaste!',exName:'',exCat:''});
  T.phases=steps; T.idx=0; T.remaining=steps[0].sec||0; T.running=true; T.last=Date.now(); T.lastSec=null;
  T.program=program||null; T.exNames=exNames||[];
  ensureCtx(); syncSoundIcon();
  $('#timerScreen').classList.add('show'); document.body.style.overflow='hidden';
  requestWake(); applyPhase();
  clearInterval(T.interval); T.interval=setInterval(tick,120);
}
function tick(){
  if(!T.running) return;
  const p=T.phases[T.idx];
  if(!p || p.mode==='manual' || p.type==='done') return;
  const now=Date.now(); T.remaining-=(now-T.last)/1000; T.last=now;
  if(T.remaining<=0.05){ T.idx++; if(T.idx>=T.phases.length){ finishSession(); return; } T.remaining=T.phases[T.idx].sec||0; T.lastSec=null; applyPhase(); }
  else { const cur=Math.ceil(T.remaining); if(cur!==T.lastSec && cur>=1 && cur<=3){ countdownBeep(cur); } T.lastSec=cur; }
  updateNum();
}
function applyPhase(){
  const p=T.phases[T.idx], sc=$('#timerScreen'), btn=$('#playBtn');
  sc.className='timer-screen show phase-'+p.type;
  $('#tsBlock').textContent=p.exCat||'';
  $('#tsLabel').textContent=p.label||'';
  $('#tsMeta').textContent=p.info||'';
  let nx=null;
  for(let i=T.idx+1;i<T.phases.length;i++){ const q=T.phases[i]; if(q.type==='done')break; if(q.exName && q.exName!==p.exName){ nx=q.exName; break; } }
  $('#tsNext').textContent = p.type==='done' ? '' : (nx? 'Sigue: '+nx : '\u00daltimo ejercicio \ud83d\udcaa');
  T.curVid = p.vid||null;
  T.curUrl = T.curVid ? ('https://www.youtube.com/watch?v='+T.curVid) : null;
  $('#tsVideo').classList.toggle('hide', !(T.curVid && p.type!=='done'));
  updateNum();
  const vibMap={prep:[120],work:[260],rest:[90,60,90],restSeries:[90,60,90,60,90],reps:[200],done:[300,120,300,120,400]};
  vibrate(vibMap[p.type]||[120]);
  phaseBeep(p.type);
  if(p.type==='done'){ T.running=false; clearInterval(T.interval); btn.textContent = T.program? '\u2713 Registrar asistencia' : 'Cerrar'; }
  else if(p.mode==='manual'){ btn.textContent='\u2713 Siguiente'; }
  else { btn.textContent = T.running?'Pausar':'Reanudar'; }
}
function updateNum(){
  const p=T.phases[T.idx];
  if(p.type==='done'){ $('#tsNum').textContent='\u2713'; $('#tsProg').style.width='100%'; return; }
  if(p.mode==='manual'){ $('#tsNum').textContent = p.reps? p.reps : '\u25b6'; $('#tsProg').style.width='100%'; return; }
  const left=Math.max(0,Math.ceil(T.remaining));
  $('#tsNum').textContent = left>=60? Math.floor(left/60)+':'+String(left%60).padStart(2,'0') : left;
  const pct=p.sec? (1-T.remaining/p.sec)*100 : 100;
  $('#tsProg').style.width=Math.min(100,Math.max(0,pct))+'%';
}
function toggleTimer(){
  const p=T.phases[T.idx]; if(!p) return;
  if(p.type==='done'){ if(T.program) finishAttendance(); else exitTimer(); return; }
  if(p.mode==='manual'){ skipPhase(); return; }
  T.running=!T.running; T.last=Date.now();
  $('#playBtn').textContent=T.running?'Pausar':'Reanudar';
  if(T.running) requestWake(); else releaseWake();
}
function skipPhase(){ if(!T.phases.length)return; T.idx++; if(T.idx>=T.phases.length){ finishSession(); return; } T.remaining=T.phases[T.idx].sec||0; T.lastSec=null; T.running=true; T.last=Date.now(); applyPhase(); }
function resetTimer(){ if(!T.phases.length)return; T.idx=0; T.remaining=T.phases[0].sec||0; T.lastSec=null; T.running=true; T.last=Date.now(); applyPhase(); }
function finishSession(){ T.idx=T.phases.length-1; T.remaining=0; applyPhase(); }
function finishAttendance(){

      <div class="avatar">${avatarInner(st)}</div>
      <div class="meta"><div class="nm">${esc(st.name)}</div><div class="dt">${st.package&&st.package.size?`${st.package.used}/${st.package.size} clases`:'Particular'}</div></div>
    </label>`).join('');
  openModal(`<h2>\u00bfQui\u00e9n asisti\u00f3?</h2>
    <div class="tiny muted" style="margin-bottom:10px">${esc(prog?prog.name:'Sesi\u00f3n')} \u00b7 ${fmtDate(todayISO())}</div>
    <div class="card pad0">${rows}</div>
    <label class="field"><span class="lab">Desempe\u00f1o (opcional, para los marcados)</span>
      <select class="input" id="att_perf"><option value="">\u2014</option><option>Excelente</option><option>Muy bien</option><option>Bien</option><option>A mejorar</option></select></label>
    <button class="btn primary" onclick="confirmAttendance()">Registrar asistencia</button>`);
}
function confirmAttendance(){
  const ids=[...document.querySelectorAll('.att-chk:checked')].map(c=>c.value);
  if(!ids.length){ toast('Marca al menos un alumno'); return; }

    db.attendance.push({id:uid(),studentId:sid,date:todayISO(),program:ctx.progName,did:ctx.did,performance:perf});

function exitTimer(){ T.running=false; clearInterval(T.interval); releaseWake(); $('#timerScreen').classList.remove('show'); document.body.style.overflow=''; }
function syncSoundIcon(){ $('#soundIcon').innerHTML = T.beep
  ? '<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/>'
  : '<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6"/>'; }
function toggleBeep(){ T.beep=!T.beep; if(T.beep) ensureCtx(); syncSoundIcon(); toast(T.beep?'Sonido activado':'Sonido en silencio'); }
let actx;
function ensureCtx(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} return actx; }
function tone(freq,dur,vol){
  if(!T.beep) return;
  const c=ensureCtx(); if(!c) return;
  try{
    const o=c.createOscillator(), g=c.createGain();
    o.type='sine'; o.frequency.value=freq;
    o.connect(g); g.connect(c.destination);
    const t0=c.currentTime;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.start(t0); o.stop(t0+dur+0.03);
  }catch(e){}
}
function countdownBeep(n){
  if(n===1) tone(1050,0.22,0.5);        // último segundo: más fuerte y agudo
  else if(n===2) tone(820,0.12,0.28);
  else tone(760,0.10,0.22);
}
function phaseBeep(type){
  if(type==='work'){ tone(990,0.20,0.36); setTimeout(()=>tone(990,0.20,0.36),150); }
  else if(type==='reps'){ tone(880,0.20,0.36); }
  else if(type==='rest'||type==='restSeries'){ tone(500,0.26,0.30); }
  else if(type==='done'){ celebrate(); }
  else { tone(620,0.16,0.26); }
}
/* ---- Celebración final: fanfarria + aplausos + voz ---- */
function brass(c,freq,t0,dur){
  try{
    const o=c.createOscillator(), g=c.createGain(), lp=c.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=freq;
    lp.type='lowpass'; lp.frequency.value=2800;
    o.connect(lp); lp.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.34,t0+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.start(t0); o.stop(t0+dur+0.05);
  }catch(e){}
}
function applause(c,t0,dur){
  try{
    const sr=c.sampleRate, len=Math.floor(sr*dur), buf=c.createBuffer(1,len,sr), data=buf.getChannelData(0);
    let amp=0.4;
    for(let i=0;i<len;i++){ amp+=(Math.random()-0.5)*0.4; if(amp<0.1)amp=0.1; if(amp>1)amp=1; data[i]=(Math.random()*2-1)*amp; }
    const src=c.createBufferSource(); src.buffer=buf;
    const bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2400; bp.Q.value=0.5;
    const g=c.createGain();
    src.connect(bp); bp.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.linearRampToValueAtTime(0.30,t0+0.2);
    g.gain.setValueAtTime(0.30,t0+dur-0.5);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    src.start(t0); src.stop(t0+dur);
  }catch(e){}
}
function say(text){
  try{
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='es-MX'; u.rate=1; u.pitch=1.15; u.volume=1;
    const v=speechSynthesis.getVoices().find(x=>/es(-|_)?(MX|ES|US|419)?/i.test(x.lang));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function celebrate(){
  if(!T.beep) return;
  const c=ensureCtx(); if(!c) return;
  const t=c.currentTime;
  applause(c, t+0.05, 2.2);
  [[523,0],[659,0.14],[784,0.28],[1046,0.46]].forEach(([f,d],i)=> brass(c,f,t+0.1+d, i===3?0.8:0.14));
  const phrases=['¡Bien hecho!','¡Excelente trabajo!','¡Lo lograste, campeón!','¡Eso es, muy bien!','¡Buen esfuerzo, crack!'];
  setTimeout(()=>say(phrases[Math.floor(Math.random()*phrases.length)]), 750);
  vibrate([300,120,300,120,500]);
}
async function requestWake(){ try{ if('wakeLock' in navigator){ T.wake=await navigator.wakeLock.request('screen'); } }catch(e){} }
function releaseWake(){ try{ T.wake&&T.wake.release(); T.wake=null; }catch(e){} }

=================================================================== */
function viewDinero(){
  const s=db.settings;
  const now=new Date(), ym=now.toISOString().slice(0,7);
  const monthTotal=db.payments.filter(p=>p.date.slice(0,7)===ym).reduce((a,p)=>a+p.amount,0);
  const allTotal=db.payments.reduce((a,p)=>a+p.amount,0);
  let h=`<section class="view"><h1 class="view-title bebas">Dinero</h1><div class="view-sub">Ingresos y paquetes</div>
  <div class="stats">
    <div class="stat green"><div class="v">${peso(monthTotal)}</div><div class="k">Este mes</div></div>
    <div class="stat accent"><div class="v">${peso(allTotal)}</div><div class="k">Total histórico</div></div>
  </div>`;
  h+=`<button class="btn primary" onclick="addPayment()" style="margin-bottom:8px">+ Registrar pago</button>`;
  h+=`<div class="section-h">Movimientos</div>`;
  const pays=db.payments.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(!pays.length) h+=`<div class="muted tiny" style="padding:4px">Sin pagos registrados.</div>`;
  else { h+=`<div class="card pad0">`; pays.forEach(p=>{
    const st=db.students.find(x=>x.id===p.studentId);
    h+=`<div class="li"><div class="avatar" style="background:linear-gradient(135deg,#1f8a4d33,#1a212b)">$</div>
      <div class="meta"><div class="nm">${st?esc(st.name):'General'}</div><div class="dt">${esc(p.concept)} · ${fmtDate(p.date)}</div></div>
      <b style="color:var(--green)">${peso(p.amount)}</b>
      <button class="icon-btn" style="width:34px;height:34px;min-height:34px" onclick="delPayment('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" style="width:15px;height:15px"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button></div>`;
  }); h+=`</div>`; }
  h+=`</section>`;
  main.innerHTML=h;
}
let payReturn=null;
function addPayment(preId){
  payReturn = preId || null;
  const s=db.settings;
  const opts=db.students.map(st=>`<option value="${st.id}" ${preId===st.id?'selected':''}>${esc(st.name)}</option>`).join('');
  const h=`<h2>Registrar pago</h2>
  <label class="field"><span class="lab">Alumno</span><select class="input" id="pa_st"><option value="">— General —</option>${opts}</select></label>
  <label class="field"><span class="lab">Concepto</span>
    <select class="input" id="pa_concept" onchange="payConceptChange()">
      <option value="paquete" data-amt="${s.pkgPrice}">Paquete ${s.pkgSize} clases (${peso(s.pkgPrice)})</option>
      <option value="particular" data-amt="${s.particularPrice}">Clase particular (${peso(s.particularPrice)})</option>
      <option value="otro" data-amt="0">Otro</option>
    </select></label>
  <label class="field"><span class="lab">Monto</span><input class="input" id="pa_amt" type="number" inputmode="numeric" value="${s.pkgPrice}"></label>
  <label class="field"><span class="lab">Fecha</span><input class="input" id="pa_date" type="date" value="${todayISO()}"></label>
  <div class="warn" id="pa_hint">Al guardar un paquete, se renueva el contador de clases del alumno (0/${s.pkgSize}).</div>
  <button class="btn primary" onclick="savePayment()">Guardar pago</button>`;
  openModal(h);
}
function payConceptChange(){
  const sel=$('#pa_concept'), amt=sel.selectedOptions[0].dataset.amt;
  $('#pa_amt').value=amt;
  $('#pa_hint').style.display = sel.value==='paquete'?'block':'none';
}
function savePayment(){
  const sid=$('#pa_st').value, concept=$('#pa_concept').value, amount=parseFloat($('#pa_amt').value)||0, date=$('#pa_date').value||todayISO();
  const s=db.settings;
  const label = concept==='paquete'?`Paquete ${s.pkgSize} clases` : concept==='particular'?'Clase particular':'Otro';
  db.payments.push({id:uid(),studentId:sid,concept:label,amount,date});
  if(concept==='paquete' && sid){ const st=db.students.find(x=>x.id===sid); if(st) st.package={size:s.pkgSize,used:0}; }
  save(); closeModal(); render(); toast('Pago registrado');
  const ret=payReturn; payReturn=null;
  if(ret && db.students.find(x=>x.id===ret)) studentDetail(ret);
}
function delPayment(id){ if(!confirm('¿Eliminar este pago?'))return; db.payments=db.payments.filter(x=>x.id!==id); save(); render(); }

/* ===================================================================
   AVANCES: Calendario + Reportes
=================================================================== */
let avSub='calendar';
let calRef={y:new Date().getFullYear(), m:new Date().getMonth()};
function avSwitch(s){ avSub=s; render(); }
function viewAvances(){
  let h=`<section class="view"><h1 class="view-title bebas">Avances</h1>
    <div class="seg"><button class="${avSub==='calendar'?'on':''}" onclick="avSwitch('calendar')">Calendario</button>
    <button class="${avSub==='reports'?'on':''}" onclick="avSwitch('reports')">Reportes</button></div>`;
  h+= avSub==='reports'? renderReportsList() : renderCalendar();
  h+=`</section>`;
  main.innerHTML=h;
}
function renderReportsList(){
  if(!db.students.length) return `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M3 3v18h18"/><path d="M7 16l4-6 3 3 5-8"/></svg><div>Agrega alumnos para generar reportes.</div></div>`;
  let h=`<div class="view-sub" style="margin-bottom:14px">Comparte el avance de cada alumno</div><div class="card pad0">`;
  db.students.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(st=>{
    h+=`<div class="li" onclick="showReport('${st.id}')"><div class="avatar">${avatarInner(st)}</div>
      <div class="meta"><div class="nm">${esc(st.name)}</div><div class="dt">${studentAttendance(st.id).length} clases registradas</div></div>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>`;
  });
  h+=`</div>`; return h;
}

/* ---- Calendario ---- */
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function ymd(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function attendanceByDate(ds){ return db.attendance.filter(a=>a.date===ds); }
function plansByDate(ds){ return (db.plans||[]).filter(p=>p.date===ds); }
function fmtDateLong(ds){ const a=ds.split('-').map(Number); const d=new Date(a[0],a[1]-1,a[2]); let s=d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'}); return s.charAt(0).toUpperCase()+s.slice(1); }
function calNav(d){ let m=calRef.m+d, y=calRef.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} calRef={y,m}; render(); }
function renderCalendar(){
  const y=calRef.y, m=calRef.m;
  const first=new Date(y,m,1);
  const startDow=(first.getDay()+6)%7; // lunes=0
  const days=new Date(y,m+1,0).getDate();
  const today=todayISO();
  let h=`<div class="cal-head">
    <button class="cal-nav" onclick="calNav(-1)">‹</button>
    <div class="cal-title bebas">${MONTHS[m]} ${y}</div>
    <button class="cal-nav" onclick="calNav(1)">›</button></div>`;
  h+=`<div class="cal-grid cal-dow">`+['L','M','X','J','V','S','D'].map(d=>`<div class="cal-dow-c">${d}</div>`).join('')+`</div>`;
  h+=`<div class="cal-grid">`;
  for(let i=0;i<startDow;i++) h+=`<div class="cal-cell empty"></div>`;
  for(let d=1; d<=days; d++){
    const ds=ymd(y,m,d);
    const att=attendanceByDate(ds).length, pl=plansByDate(ds).length;
    let ic=''; if(att) ic+='🔥'; if(pl) ic+='📋';
    h+=`<button class="cal-cell${ds===today?' today':''}${(att||pl)?' active':''}" onclick="openDay('${ds}')"><span>${d}</span><div class="cal-ic">${ic}</div></button>`;
  }
  h+=`</div>`;
  h+=`<div class="cal-legend"><span>🔥 Clase registrada</span><span>📋 Plan del día</span></div>`;
  return h;
}
function openDay(ds){
  const att=attendanceByDate(ds);
  const groups={};
  att.forEach(a=>{ const k=a.program||'Sesión libre'; (groups[k]=groups[k]||[]).push(a); });
  const plans=plansByDate(ds);
  let h=`<h2>${fmtDateLong(ds)}</h2>`;
  h+=`<div class="section-h" style="margin-top:2px">Hecho este día</div>`;
  if(!att.length){ h+=`<div class="tiny muted" style="padding:2px 2px 8px">Nada registrado aún. Se llena solo al correr un programa en la guía en vivo.</div>`; }
  else Object.entries(groups).forEach(([prog,list])=>{
    const names=list.map(a=>{ const st=db.students.find(s=>s.id===a.studentId); return st?st.name:'?'; });
    h+=`<div class="card"><div class="row between"><b>${esc(prog)}</b><span class="pill green">${list.length} asist.</span></div>
      <div class="tiny muted" style="margin-top:6px">${names.map(esc).join(', ')}</div>
      ${list[0].did?`<div class="tiny" style="margin-top:6px;color:var(--accent2)">${esc(list[0].did)}</div>`:''}</div>`;
  });
  h+=`<div class="section-h">Plan del día</div>`;
  if(!plans.length){ h+=`<div class="tiny muted" style="padding:2px 2px 8px">Sin plan. Agrega lo que vas a trabajar.</div>`; }
  else plans.forEach(p=>{
    const prog=p.programId? db.programs.find(x=>x.id===p.programId):null;
    const title=prog?prog.name:(p.title||'Actividad');
    const done=att.some(a=>a.program===(prog?prog.name:p.title))?`<span class="pill green">✓ hecho</span>`:'';
    h+=`<div class="card"><div class="row between"><b>${p.time?esc(p.time)+' · ':''}${esc(title)}</b>${done}</div>
      ${p.note?`<div class="tiny muted" style="margin-top:4px">${esc(p.note)}</div>`:''}
      <div class="btn-row" style="margin-top:10px">
        ${prog?`<button class="btn sm primary" style="flex:1" onclick="closeModal();runProgram('${prog.id}')"><svg viewBox="0 0 24 24" width="16" height="16" fill="#fff"><path d="M5 4l14 8-14 8z"/></svg>Iniciar</button>`:''}
        <button class="btn sm ghost" onclick="editPlan('${ds}','${p.id}')">Editar</button>
        <button class="btn sm ghost danger" onclick="delPlan('${ds}','${p.id}')">Borrar</button>
      </div></div>`;
  });
  h+=`<button class="btn primary" style="margin-top:8px" onclick="editPlan('${ds}','')">+ Agregar al plan</button>`;
  openModal(h);
}
function editPlan(ds,id){
  const pl=id? db.plans.find(x=>x.id===id):null;
  const progOpts=db.programs.map(p=>`<option value="${p.id}" ${pl&&pl.programId===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  const h=`<h2>${pl?'Editar plan':'Agregar al plan'}</h2>
   <div class="tiny muted" style="margin-bottom:10px">${fmtDateLong(ds)}</div>
   <label class="field"><span class="lab">Programa</span><select class="input" id="pl_prog"><option value="">— Libre / otro —</option>${progOpts}</select></label>
   <label class="field"><span class="lab">Título (si es libre)</span><input class="input" id="pl_title" value="${pl?esc(pl.title||''):''}" placeholder="Ej. Bateo grupo avanzado"></label>
   <label class="field"><span class="lab">Hora (opcional)</span><input class="input" id="pl_time" value="${pl?esc(pl.time||''):''}" placeholder="Ej. 5:00 PM"></label>
   <label class="field"><span class="lab">Nota / grupo (opcional)</span><textarea class="input" id="pl_note" placeholder="Grupo, enfoque, recordatorios...">${pl?esc(pl.note||''):''}</textarea></label>
   <button class="btn primary" onclick="savePlan('${ds}','${id||''}')">Guardar</button>`;
  openModal(h);
}
function savePlan(ds,id){
  if(!db.plans) db.plans=[];
  const programId=$('#pl_prog').value, title=$('#pl_title').value.trim(), time=$('#pl_time').value.trim(), note=$('#pl_note').value.trim();
  if(!programId && !title){ toast('Elige un programa o escribe un título'); return; }
  if(id){ Object.assign(db.plans.find(x=>x.id===id), {programId,title,time,note}); }
  else db.plans.push({id:uid(),date:ds,programId,title,time,note});
  save(); openDay(ds); render(); toast('Plan guardado');
}
function delPlan(ds,id){ if(!confirm('¿Borrar este plan?'))return; db.plans=db.plans.filter(x=>x.id!==id); save(); openDay(ds); render(); toast('Plan borrado'); }

function buildReportText(st){
  const att=studentAttendance(st.id);
  const used=st.package?.used||0, size=st.package?.size||0;
  let t=`🏟️ DYNASTIA · Reporte de avance\n${st.name}\n${fmtDate(todayISO())}\n\n`;
  t+=`📋 Asistencias: ${att.length} clase${att.length===1?'':'s'}\n`;
  if(size) t+=`🎟️ Paquete actual: ${used} de ${size} clases${used>=size?' (completo)':` · te quedan ${size-used}`}\n`;
  const perfs=att.filter(a=>a.performance);
  if(perfs.length) t+=`⭐ Último desempeño: ${perfs[0].performance}\n`;
  t+=`\nÚltimas sesiones:\n`;
  att.slice(0,5).forEach(a=>{ t+=`• ${fmtDate(a.date)}${a.performance?` — ${a.performance}`:''}\n`; if(a.did) t+=`   ${a.did}\n`; });
  if(!att.length) t+=`(Aún sin clases registradas)\n`;
  t+=`\n¡Sigue así! 🔥`;
  return t;
}
function showReport(id){
  const st=db.students.find(x=>x.id===id);
  const txt=buildReportText(st);
  const h=`<h2>Reporte · ${esc(st.name)}</h2>
  <div class="card" style="white-space:pre-wrap;font-size:14px;line-height:1.6">${esc(txt)}</div>
  <div class="btn-row">
    <button class="btn primary" onclick='shareReport(${JSON.stringify(txt)})'><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="#fff" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>Compartir</button>
    <button class="btn ghost" style="flex:0 0 auto" onclick='copyReport(${JSON.stringify(txt)})'>Copiar</button>
  </div>`;
  openModal(h);
}
async function shareReport(txt){
  try{ if(navigator.share){ await navigator.share({text:txt}); return; } }catch(e){ return; }
  copyReport(txt);
}
function copyReport(txt){
  try{ navigator.clipboard.writeText(txt); toast('Reporte copiado'); }
  catch(e){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('Reporte copiado'); }
}

/* ===================================================================
   AJUSTES
=================================================================== */
function openSettings(){
  const s=db.settings;
  const h=`<h2>Ajustes</h2>
  <label class="field"><span class="lab">Precio del paquete</span><input class="input" id="s_pkg" type="number" value="${s.pkgPrice}"></label>
  <label class="field"><span class="lab">Clases por paquete</span><input class="input" id="s_size" type="number" value="${s.pkgSize}"></label>
  <label class="field"><span class="lab">Precio clase particular</span><input class="input" id="s_part" type="number" value="${s.particularPrice}"></label>
  <button class="btn primary" onclick="saveSettings()">Guardar ajustes</button>
  <div class="section-h">Datos</div>
  <div class="btn-row">
    <button class="btn ghost" onclick="exportData()">Exportar copia</button>
    <button class="btn ghost danger" onclick="resetData()" style="flex:0 0 auto">Borrar todo</button>
  </div>
  <div class="tiny muted" style="margin-top:14px;line-height:1.6">Tus datos se guardan solo en este dispositivo. Haz una copia de vez en cuando para no perderlos.</div>`;
  openModal(h);
}
function saveSettings(){
  db.settings.pkgPrice=parseFloat($('#s_pkg').value)||0;
  db.settings.pkgSize=parseInt($('#s_size').value)||6;
  db.settings.particularPrice=parseFloat($('#s_part').value)||0;
  save(); closeModal(); render(); toast('Ajustes guardados');
}
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='dynastia-respaldo-'+todayISO()+'.json'; a.click(); toast('Copia descargada');
}
function resetData(){ if(!confirm('Esto borra TODOS los datos. ¿Seguro?'))return; if(!confirm('Última confirmación: se perderá todo.'))return; db=loadDB.call(null); db={students:[],programs:[],attendance:[],payments:[],settings:{pkgPrice:300,pkgSize:6,particularPrice:150}}; save(); closeModal(); go('alumnos'); toast('Datos borrados'); }

/* ---------------- init ---------------- */
async function requestPersistence(){
  try{
    if(navigator.storage && navigator.storage.persist){
      const already = navigator.storage.persisted ? await navigator.storage.persisted() : false;
      if(!already) await navigator.storage.persist();
    }
  }catch(e){}
}
requestPersistence();
render();
</script>
